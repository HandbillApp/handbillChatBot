<div id="chatbot-container" style="
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 350px;
  height: 500px;
  z-index: 9999;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  border-radius: 12px;
  overflow: hidden;
  display: none;
">
  <iframe
    src="https://app.wonderchat.io/chatbot/cmomz3wgk0ce86pdc7amd6mrj"
    style="border: none; width: 100%; height: 100%;"
    allow="clipboard-read; clipboard-write"
  ></iframe>
</div>

<button onclick="toggleChat()" style="
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #007bff;
  color: white;
  border: none;
  padding: 15px 18px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  z-index: 10000;
">
💬
</button>

<script>
function toggleChat() {
  const chat = document.getElementById('chatbot-container');
  chat.style.display = chat.style.display === 'none' ? 'block' : 'none';
}
</script>

<script src="https://app.wonderchat.io/scripts/wonderchat-frame.js" 
data-chatbot-id="cmomz3wgk0ce86pdc7amd6mrj"></script>
